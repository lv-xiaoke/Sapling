        - heading "国家卫生健康委办公厅关于印发婴幼儿早期发展服务指南（试行）的通知" [level=1] [ref=e107]
        - generic [ref=e108]:
          - text: 发布时间：2025-02-14 17:33
          - generic [ref=e109]: 浏览次数：
          - generic [ref=e110] [cursor=pointer]: 字体：【大中小】
        - generic [ref=e111]:
          - paragraph [ref=e112]:
            - strong [ref=e114]: 国家卫生健康委办公厅关于印发婴幼儿早期发展服务指南（试行）的通知
            - text: 国卫办妇幼函〔2024〕467号
          - paragraph [ref=e115]: 各省、自治区、直辖市及新疆生产建设兵团卫生健康委：
          - paragraph [ref=e116]: 国务院办公厅《关于加快完善生育支持政策体系推动建设生育友好型社会的若干措施》明确提出，大力推进儿童早期发展工作。为贯彻落实有关工作要求，进一步加强婴幼儿早期发展服务，提高科学性和可及性，我委组织编写了《婴幼儿早期发展服务指南（试行）》。现印发给你们，供参考使用。
          - paragraph [ref=e117]:
            - text: 国家卫生健康委办公厅
            - text: 2024年12月5日
          - paragraph [ref=e118]: （信息公开形式：主动公开）
          - paragraph [ref=e119]:
            - strong [ref=e121]: 婴幼儿早期发展服务指南（试行）
          - paragraph [ref=e122]: 婴幼儿早期发展主要指0～3岁儿童大运动、精细动作、语言、认知和社会交往能力等方面的发展。0～3岁是儿童生命的早期，也是儿童成长和发展的关键窗口期。这一时期大脑、神经系统、运动系统发育最快，可塑性最强。在这个阶段，开展促进婴幼儿早期发展服务，指导养育人建立科学正确的养育行为，可以促进婴幼儿身心充分发育，激发最佳发育潜能，大运动、精细动作、语言、认知和社会交往能力达到最佳状态，为一生发展奠定良好基础。联合国儿童基金会、世界卫生组织共同发布的《养育照护框架—促进儿童早期发展》明确提出，提供回应性照护和早期学习机会，是促进婴幼儿早期发展极为重要的措施。为进一步加强婴幼儿早期发展服务，提高科学性和可及性，制定本指南。
          - paragraph [ref=e123]:
            - strong [ref=e124]: 一、服务对象
          - paragraph [ref=e125]: 辖区内常住的0～3岁婴幼儿及其养育人。
          - paragraph [ref=e126]:
            - strong [ref=e127]: 二、服务内容
          - paragraph [ref=e128]: 针对婴幼儿养育人开展养育风险评估与指导，针对婴幼儿和养育人开展养育照护小组活动。
          - paragraph [ref=e129]: 婴幼儿早期发展服务主要由乡镇卫生院、社区卫生服务中心以及县级妇幼保健机构提供，有利于提高服务的可及性。鼓励各级各类医疗机构结合实际开展婴幼儿早期发展服务。
          - paragraph [ref=e130]:
            - strong [ref=e131]: （一）养育风险评估与指导。
          - paragraph [ref=e132]:
            - strong [ref=e133]: 1.评估与指导时机及频次。
            - text: 根据不同年龄段婴幼儿发育特点，结合0～6岁儿童健康管理服务时间和频次，在婴幼儿满1、3、6、8、12、18、24、30、36月龄时，共进行9次养育风险评估与指导。其中，新生儿期1次，在满月时；婴儿期4次，分别在3、6、8、12月龄时；1至3岁幼儿期4次，分别在18、24、30、36月龄时。儿童保健人员在提供0～6岁儿童健康体检后，开展养育风险评估与指导服务。
          - paragraph [ref=e134]:
            - strong [ref=e135]: 2.评估与指导内容。
          - paragraph [ref=e136]: 针对0～3岁婴幼儿养育人开展健康教育、养育风险评价及咨询指导。
          - paragraph [ref=e137]:
            - strong [ref=e138]: （1）健康教育。
          - paragraph [ref=e139]:
            - strong [ref=e140]: ①关于养育行为。
            - text: 0～3岁为婴幼儿期。这一时期大脑发育速度最快，大脑细胞、神经元联系形成最旺盛，80%的大脑发育发生在3岁以前，且受遗传因素和环境因素共同影响。抓住0～3岁大脑发育的黄金时期，养育人有针对性的对儿童大脑和神经系统进行科学干预，通过良好的环境因素，可以促进婴幼儿大运动、精细动作、语言、认知和社会交往能力快速全面发展，主要干预措施就是为婴幼儿提供回应性照护和早期学习机会。
          - paragraph [ref=e141]: 回应性照护指养育人注意观察婴幼儿的眼神、表情、动作、声音、手势和口头请求，积极予以回应，日常陪伴儿童一起交流嬉戏。这些互动能够刺激大脑内部神经元联系形成，帮助婴幼儿认识周围的世界，对人、关系和语言形成认知，促进大运动、精细动作发育。早期学习机会指养育人通过亲子游戏、亲子阅读、亲子交流（身体接触、肢体语言表达、语言表达）等方式，帮助婴幼儿习得人际交流的能力，习得情感表达，习得考虑他人感受的重要性，了解人、事物之间的联系。促进婴幼儿早期发展，重要的措施是提供回应性照护和早期学习机会，强调的是养育人对婴幼儿的陪伴，以及情感交流和行为互动，主要目的就是刺激婴幼儿大脑和神经系统更好地发育，促进儿童运动、语言、认知、社会交往能力发展达到最佳状态。
          - paragraph [ref=e142]: 养育人对婴幼儿进行回应性照护，为孩子提供早期学习机会，不仅能够促进婴幼儿运动、语言、认知和社会交往能力发展，更重要的是可以与婴幼儿建立良好的亲子依恋关系。养育人给予婴幼儿适当、稳定、不间断的关怀照顾、哺育抚摸，儿童将获得心理和情感上的满足，建立起亲子依恋关系，形成安全感。婴幼儿期有安全感的孩子，情绪稳定，活泼开朗，注意力集中，能够与他人进行良好的交往，具有适应新环境的能力。未建立良好亲子依恋关系的儿童缺乏安全感，容易形成多疑、孤僻、冷漠、焦虑、自卑等负面情绪，对他人缺乏信任感，人际交往有困难。养育人要充分认识建立良好的亲子依恋关系的重要性。
          - paragraph [ref=e143]: 日常养育过程中，养育人应注重为婴幼儿提供回应性照护和早期学习机会，提供高质量的亲子陪伴与互动，使婴幼儿的情感良好，运动、语言、认知、社会交往能力得到充分发展。家庭成员之间的相互交流、沟通和支持，有利于婴幼儿的早期发展。
          - paragraph [ref=e144]:
            - strong [ref=e145]: ②关于养育环境。
            - text: 良好的家庭养育环境是促进婴幼儿大运动、精细动作、语言、认知和社会交往能力发展的有利条件。家庭为婴幼儿提供适合其年龄的玩具、图书，提供与同龄儿童玩耍和自由探索周围环境的机会，是促进婴幼儿生长发育、认知世界、形成创造力的重要前提和基础。玩具是婴幼儿成长过程中不可缺少的伙伴，丰富的玩具种类是开展多样化亲子游戏的基础。合适的玩具能为婴幼儿提供丰富的感官刺激。养育人利用玩具与儿童进行亲子游戏，有利于婴幼儿感知觉、动作、认知等能力的全面发展。图书是婴幼儿认识世界的重要途径之一，养育人与婴幼儿一起读图画书，亲子共同阅读，可以有效促进婴幼儿认知发展。与同龄人交往可以帮助婴幼儿习得与他人沟通合作和解决冲突的能力。大自然的各种声音、气味、触觉和视觉刺激，可以帮助婴幼儿发展感知能力，提高对外界环境的认知和理解能力。养育环境单调，缺少玩具和图书，缺少与同伴的交流，将限制婴幼儿获得学习机会和发展自身能力。因此，婴幼儿家庭要高度重视养育环境的建立，要为婴幼儿提供种类多样的玩具和图书，创造更多的机会让孩子与同龄儿童玩耍，在大自然中嬉戏探索。
          - paragraph [ref=e146]: 不宜将视屏类产品，包括电视、电脑、手机、平板、游戏机等作为儿童的“玩伴”。如果养育人经常让婴幼儿使用视屏类产品，与孩子陪伴、交流、互动的时间就会减少，对儿童大脑和神经系统的正向刺激就会显著降低，对于婴幼儿大运动、精细动作、语言、认知和社会交往能力发展极为不利。使用视屏类产品，还会增加儿童近视的发生风险。0～3岁的婴幼儿应当不接触任何形式的视屏类产品。
          - paragraph [ref=e147]:
            - strong [ref=e148]: ③关于养育人心理健康。
            - text: 养育人情绪良好、心理健康，可以为婴幼儿提供高质量的陪伴、交流和互动，提供安全、愉悦的养育环境。母亲作为主要的养育人，如果存在抑郁、焦虑等心理健康问题，将影响回应婴幼儿的各种请求，影响与婴幼儿的交流、互动，难以形成良好的亲子依恋关系，不利于婴幼儿生理、心理和社会适应能力的发展。产后抑郁是母亲心理健康的主要问题之一，会导致母婴互动不佳，妨碍正常的亲子依恋关系形成，影响后代的运动、语言、认知发展，增加情感和行为问题。产后抑郁的母亲，孩子更有可能出现过度哭泣、睡眠障碍和情绪问题，发生疾病的风险也会增加，儿童死亡的风险也会上升。因此针对存在心理健康问题的养育人，特别是婴幼儿母亲，及早发现问题，对症干预，不仅有利于改善养育人的心理健康状况，而且对婴幼儿的发育和健康具有重要意义。
          - paragraph [ref=e149]:
            - strong [ref=e150]: （2）养育风险评价。
            - text: 针对婴幼儿养育人，应用《3岁以下婴幼儿养育风险评估表》（附件1表1～表3），采用一对一方式询问8～10个问题，了解养育人过去1个月内的养育行为、家庭的养育环境和养育人心理健康状况，评估是否满足回应性照护和提供早期学习机会的各项要素，发现可能存在的养育风险，分析对儿童发育的影响，为进行咨询指导提供依据。
          - paragraph [ref=e151]:
            - strong [ref=e152]: ①养育行为评价。
            - text: 评价养育人提供回应性照护和早期学习机会等促进儿童早期发展的方式方法。
          - paragraph [ref=e153]: 1）询问养育人是否很少恰当及时回应婴幼儿的声音和口头表达。如果回答为“是”，评价为存在风险。不能及时恰当回应婴幼儿的各种请求，与婴幼儿缺少交流互动，难以在养育人与儿童间建立亲密的依恋关系，婴幼儿缺乏安全感。同时，缺少交流互动，对婴幼儿有益的刺激减少，不利于婴幼儿语言、认知、社会交往能力的发展。
          - paragraph [ref=e154]: 2）询问养育人是否很少与婴幼儿说话、逗笑、讲故事或玩耍。如果回答为“是”，评价为存在风险。养育人不能经常性地与婴幼儿说话、逗笑、讲故事或玩耍，对儿童大脑、神经系统、运动系统的有效刺激就会减少，不利于婴幼儿语言、社会交往、运动等能力的发展。
          - paragraph [ref=e155]: 3）询问父亲母亲是否很少参与照护，或者养育人是否频繁更换。如果回答为“是”，评价为存在风险。缺少父母长期的陪伴，或者养育人频繁更换，这种情形将影响亲子依恋关系的建立，导致孩子缺乏安全感，出现孤独、焦虑、自卑等负面情绪和社会交往困难。
          - paragraph [ref=e156]: 4）询问家庭成员是否养育原则不一致，是否存在养育冲突。如果回答为“是”，评价为存在风险。这种情形会导致家庭氛围紧张，使婴幼儿难以获得安全感，感到困惑、焦虑或不安。
          - paragraph [ref=e157]: 5）询问养育人是否很少采用拥抱依偎、表扬鼓励的方式表达对婴幼儿的爱，是否经常对婴幼儿发脾气或使用暴力。如果回答为“是”，评价为存在风险。婴幼儿长期接收不到来自养育人的爱意表达、肯定性表达，心理上得不到支持，情感上得不到满足，很难建立安全感。婴幼儿经常目睹养育人发脾气或使用暴力，会产生深深的恐惧，容易形成焦虑、孤僻的性格，对他人缺乏信任感，人际交往易出现困难。
          - paragraph [ref=e158]:
            - strong [ref=e159]: ②养育环境评价。
            - text: 评价为促进婴幼儿早期发展，家庭配备玩具、图书的情况，以及家庭成员之间互相沟通、支持的情况。
          - paragraph [ref=e160]: 1）询问家庭中适合婴幼儿的玩具和图书是否很少或没有。如果回答为“是”，评价为存在风险。家中缺少玩具和图书，亲子间将难以开展亲子游戏和亲子阅读，对婴幼儿的触觉、听觉、视觉等刺激减少，互动减少，不利于儿童运动、语言、认知和社会交往能力的发展。
          - paragraph [ref=e161]: 2）询问是否给婴幼儿使用视屏类电子产品，2岁以上是否超过1小时。如果回答为“是”，评价为存在风险。养育人允许婴幼儿经常使用视屏类电子产品，导致运动和亲子活动时间减少，会影响亲子陪伴质量，影响亲子间的交流互动，影响视力发育，不利于婴幼儿运动、语言、认知、社会交往能力的发展。
          - paragraph [ref=e162]: 3）询问养育人是否很少带婴幼儿接触大自然，很少带孩子与同龄人玩耍。如果回答为“是”，评价为存在风险。婴幼儿很少接触大自然，将减少认知世界的机会；很少与同龄儿童一起玩耍，难以培养与他人沟通交流和解决冲突的能力。
          - paragraph [ref=e163]: 4）询问养育人是否很少获得家庭成员、亲戚、朋友等在情感、经济和照顾孩子方面的支持。如果回答为“是”，评价为存在风险。在抚育婴幼儿的过程中，如果遇到问题和困难，养育人得不到近亲属和亲朋好友的社会支持，将在心理上形成较大的压力和焦虑，会感到疲惫和无助，影响心理健康，从而影响与孩子的交流互动，影响婴幼儿早期发展。
          - paragraph [ref=e164]: 5）询问家庭是否遭遇经济困难、夫妻离异、家人重病等不幸事件。如果回答为“是”，评价为存在风险。这些情形会对养育人的心理造成压力，严重时导致养育人焦虑抑郁，影响对婴幼儿的陪伴和与婴幼儿的交流互动，影响婴幼儿早期发展。
          - paragraph [ref=e165]:
            - strong [ref=e166]: ③养育人心理健康状况评价。
            - text: 询问婴幼儿养育人是否经常出现情绪低落、哭泣、过度担心或焦虑的情况。如果回答为“是”，评价为存在风险。养育人如果情绪不稳定，时常担心焦虑，将影响与婴幼儿的交流互动，难于在亲子间建立亲密的依恋关系，不利于婴幼儿大运动、精细动作、语言、认知和社会交往能力的发展。
          - paragraph [ref=e167]: 通过养育风险评价，若发现养育人存在一个或多个风险因素，则风险评价结果为阳性。
          - paragraph [ref=e168]:
            - strong [ref=e169]: （3）咨询指导。
            - text: 在开展健康教育、养育风险评价的基础上，对养育人给予针对性咨询指导和普遍性咨询指导，帮助养育人纠正养育行为和养育环境中存在的问题，指导养育人掌握回应性照护、提供早期学习机会等促进婴幼儿早期发展的方法和技能。
          - paragraph [ref=e170]:
            - strong [ref=e171]: ①针对性咨询指导。
          - paragraph [ref=e172]: 经养育风险评价，未发现养育风险因素的，对养育人给予肯定，鼓励继续保持良好的养育行为和养育环境。
          - paragraph [ref=e173]: 经养育风险评价，发现存在养育风险因素的，结合《3岁以下婴幼儿养育风险咨询表》（附件2），给出针对性的咨询指导意见，纠正不良的养育行为、不适宜的养育环境。讲解0～3岁不同月龄提供回应性照护和早期学习机会的知识和具体行为。预约近期（1～2个月）复查养育风险因素。如养育风险因素持续无法改进，或发现已导致婴幼儿出现疑似体格发育迟缓或神经心理发育迟缓等情况，应及时转介至县级妇幼保健机构或相关专业医疗机构进行专项检查。
          - paragraph [ref=e174]:
            - strong [ref=e175]: ②普遍性咨询指导。
          - paragraph [ref=e176]: 经养育风险评估后，对所有养育人给予普遍性咨询指导，包括婴幼儿亲子交流与玩耍咨询指导、婴幼儿心理行为发育标志自评咨询指导。
          - paragraph [ref=e177]: 1）婴幼儿亲子交流与玩耍咨询指导。根据婴幼儿所处的不同月龄段，将养育人提供回应性照护和早期学习机会的具体操作归纳概括为《婴幼儿亲子交流与玩耍要点》（见附件3），明确0～3岁期间，8个关键月龄段亲子交流与玩耍的核心知识和具体操作。儿童保健人员据此指导养育人了解掌握不同月龄段与婴幼儿交流与玩耍的核心要义。不同月龄段交流与玩耍的要点如下：
          - paragraph [ref=e178]: 0～1月龄：这是新生儿脱离母体后适应周围环境的关键时期，应重点指导养育人在哺乳、日常照护中通过注视新生儿的眼睛、与新生儿说话、抚摸或怀抱新生儿等方式加强与新生儿互动，逐步形成情感连结，促进新生儿视听感知等方面发育。
          - paragraph [ref=e179]: 1～6月龄（1～3月龄和3～6月龄）：婴儿的认知、大运动等能力开始迅速发展，应重点指导养育人通过模仿婴儿的声音、动作、进行母子（父子）交流等方式促进婴儿语言、社会交往能力发展；通过引导婴儿练习俯卧、抬头、翻身等方式促进婴儿大运动等发展。
          - paragraph [ref=e180]: 6～12月龄（6～9月龄和9～12月龄）：婴儿在大运动、精细动作、语言等方面发展迅速，应重点指导养育人通过引导婴儿练习独坐、爬行、站立、扶走等动作，促进婴儿大运动发展；通过引导婴儿练习抓握、传递、敲打、捏取等操作，促进婴儿精细动作发展；通过与婴儿说话、做手势等方式促进婴儿语言发展。
          - paragraph [ref=e181]: 12～36月龄（12～18月龄、18～24月龄和24～36月龄）：幼儿活动范围不断扩大，语言、认知、动作、社会交往等能力全面发展，应重点指导养育人通过提出简单问题、阅读并讨论图画书等方式促进幼儿语言、认知等能力发展；通过引导幼儿练习独走、蹲起、上下台阶、单脚站立、双脚蹦跳、踢球等方式促进幼儿大运动发展，通过练习握笔、翻书、扣扣子等方式促进幼儿精细动作发展。
          - paragraph [ref=e182]: 2）婴幼儿心理行为发育标志自评咨询指导。这是针对养育人进行普遍性咨询指导的一项重要内容。婴幼儿心理行为发育遵循由简单到复杂、由低级到高级、由分化到统一的规律，每一月龄阶段都会出现标志性的发育特征，形成了连续递进的婴幼儿心理行为发育标志。指导养育人应用《3岁以下婴幼儿心理行为发育标志自评表》（附件4），在3、6、8、12、18、24、30、36月龄时，对婴幼儿大运动、精细动作、语言、认知、社会交往能力等方面进行自评。婴幼儿能够达到相应发育特征，养育人在该项发育标志后选“是”，表示婴幼儿达到相应月龄大多数婴幼儿的能力发展水平。具体如下：
          - paragraph [ref=e183]: 大运动方面，婴幼儿3月龄时竖抱头可以稳稳地立起，6月龄时可以自己坐一会儿，8月龄时可腹部贴着床面爬行，12月龄时可自己独站数秒以上，18月龄时可扶着墙或栏杆上楼梯，24月龄时可双脚同时离地跳起，30月龄时可双脚向前跳出一段距离，36月龄时可单脚站5秒以上。
          - paragraph [ref=e184]: 精细动作方面，婴幼儿3月龄时可手握玩具，6月龄时可两手传递玩具，8月龄时可用两手拿小东西对敲，12月龄时可把小丸放进小瓶，18月龄时可用手拧瓶盖、上发条，24月龄时可一页页翻书，30月龄时可模仿大人画横线，36月龄时可用绳穿扣子或串珠。
          - paragraph [ref=e185]: 语言方面，婴幼儿3月龄时可发声回应养育人，6月龄时叫名字时有反应，8月龄时可发出一连串重复的音节，12月龄时可听懂1个以上物品名，18月龄时可说出3个有意义的词，24月龄时可说简单的句子，30月龄时可回答简单问题，36月龄时可说出简单故事的大部分情节。
          - paragraph [ref=e186]: 认知方面，婴幼儿3月龄时可用眼睛寻找声源，6月龄时看到物品掉落去找，8月龄时可注意到物品上的细节，12月龄时可模仿他人正在做的动作，18月龄时知道常用物品用途，24月龄时可玩装扮游戏，30月龄时可模仿他人用积木搭火车、小桥等，36月龄时可理解时间概念。
          - paragraph [ref=e187]: 社会交往方面，婴幼儿3月龄时可以微笑回应他人的笑脸，6月龄时可区分熟人和生人，8月龄时对陌生人出现害怕的反应，12月龄时对他人面部表情有反应，18月龄时可与他人玩传球等互动游戏。2岁及以后幼儿逐步具备自理能力，24月龄时可主动示意大小便，30月龄时懂得轮流(如排队滑滑梯)，36月龄时可自己穿鞋子或袜子等。
          - paragraph [ref=e188]: 养育人如发现婴幼儿在相应月龄有1项发育标志未出现，应通过加强亲子交流与玩耍等促进发育，并向医务人员寻求指导和帮助；养育人如发现婴幼儿在相应月龄有2项及以上发育标志未出现，应带婴幼儿到医疗机构进行相关检查。
          - paragraph [ref=e189]: 通过开展婴幼儿心理行为发育自评，促进养育人为婴幼儿持续提供回应性照护及早期学习机会。
          - paragraph [ref=e190]:
            - strong [ref=e191]: （二）养育照护小组活动。
          - paragraph [ref=e192]:
            - strong [ref=e193]: 1.服务形式。
          - paragraph [ref=e194]: 在乡级和县级开展养育照护小组活动。如果村级具备条件，可在县级和乡级机构指导下，在村级开展养育照护小组活动。依据婴幼儿发育规律和特点，按照0～1岁、1～2岁、2～3岁分组组织活动。每组5～10名婴幼儿及其养育人，每次活动40～50分钟。
          - paragraph [ref=e195]:
            - strong [ref=e196]: 2.服务频次。
          - paragraph [ref=e197]: 0～3岁期间共为婴幼儿及养育人提供12次养育照护小组活动，其中0～1岁4次，1～2岁4次，2～3岁4次。有条件的地区可增加活动内容和频次，为婴幼儿及其养育人提供更加密集的养育照护小组活动。
          - paragraph [ref=e198]:
            - strong [ref=e199]: 3.服务内容。
          - paragraph [ref=e200]: 参考《养育照护小组活动主题一览表》（附件5）安排每次活动，包括健康宣教、育儿分享、亲子活动等环节。
          - paragraph [ref=e201]: 其中，亲子活动是最重要、最核心的内容，包括亲子游戏、亲子阅读、亲子同唱等。亲子活动针对不同月龄婴幼儿心理行为发育特点，设计了差异化的游戏、阅读、同唱活动，旨在针对性促进婴幼儿大运动、精细动作、语言、认知和社会交往能力达到相应月龄发育标志。亲子活动通过先进行现场示教，然后组织家长和儿童进行练习的方式，面对面指导养育人进一步掌握回应性照护和提供早期学习机会的具体方法和技能。
          - paragraph [ref=e202]: 养育照护小组活动为婴幼儿养育人提供了学习养育方法和技能的场所，养育人将在此学习到的方法和技能带回家中，在日常养育照料中应用，促进婴幼儿大运动、精细动作、语言、认知、社会交往能力不断发育，达到发育标志，促进婴幼儿早期发展。
          - paragraph [ref=e203]:
            - strong [ref=e204]: 三、服务机构和人员
          - paragraph [ref=e205]:
            - strong [ref=e206]: （一）场地和设备要求。
          - paragraph [ref=e207]: 乡镇卫生院、社区卫生服务中心及县级妇幼保健机构应当设置开展养育风险评估和咨询指导的独立空间，房屋布局合理，功能符合需要，室内环境温馨、舒适，设施设备符合安全、便利要求。配备必要的桌椅和玩具、婴幼儿养育风险评估与咨询指导工具，用于开展服务。
          - paragraph [ref=e208]: 用于开展养育照护小组活动的场地应安全卫生、通风良好、环境安静，面积不少于20平米，地面宜采用防滑、软质材料，玩教具及公用设施应定期清洗消毒。有条件的地区，可配备母婴室等相关设施。
          - paragraph [ref=e209]: 有条件的地区可以利用村卫生室、村委会活动室、社区卫生服务站、居委会活动室、幼儿园、托育机构或小学校舍等场地，开展养育照护小组活动，方便婴幼儿及养育人参与活动，提高服务可及性。
          - paragraph [ref=e210]:
            - strong [ref=e211]: （二）人员要求。
          - paragraph [ref=e212]: 1.养育风险评价及咨询指导。乡镇卫生院、社区卫生服务中心及县级妇幼保健机构至少配备1名接受过早期发展专业技术培训并合格的儿童保健人员从事养育风险评价与咨询指导服务。
          - paragraph [ref=e213]: 2.养育照护小组活动。由经培训并合格的儿童保健医生、护士、幼教老师等担任养育指导员，开展养育照护小组活动。每次活动由1-2名养育指导员组织。
          - paragraph [ref=e214]:
            - strong [ref=e215]: 四、服务分工
          - paragraph [ref=e216]:
            - strong [ref=e217]: （一）县级妇幼保健机构。
          - paragraph [ref=e218]: 1.开展科普宣传，普及回应性照护和提供早期学习机会等促进婴幼儿早期发展的知识和技能。
          - paragraph [ref=e219]: 2.开展养育风险评估，及时发现养育人的养育问题并给予针对性指导，同时开展婴幼儿亲子交流与玩耍指导及婴幼儿心理行为发育标志自评指导。
          - paragraph [ref=e220]: 3.开展养育照护小组活动。
          - paragraph [ref=e221]: 4.针对乡镇卫生院、社区卫生服务中心及其他医疗机构，提供专业人力支持，开展人员培训、技术指导和质量控制。
          - paragraph [ref=e222]: 5.接受乡镇卫生院、社区卫生服务中心转诊的疑似体格发育迟缓或神经心理发育迟缓的婴幼儿。
          - paragraph [ref=e223]:
            - strong [ref=e224]: （二）乡镇卫生院、社区卫生服务中心。
          - paragraph [ref=e225]: 1.开展科普宣传，普及回应性照护和提供早期学习机会等促进婴幼儿早期发展的知识和技能。
          - paragraph [ref=e226]: 2.开展养育风险评估，及时发现养育人的养育问题并给予针对性指导，同时开展婴幼儿亲子交流与玩耍指导及婴幼儿心理行为发育标志自评指导。
          - paragraph [ref=e227]: 3.开展养育照护小组活动。
          - paragraph [ref=e228]: 4.将养育风险评估中发现的疑似体格发育迟缓或神经心理发育迟缓的婴幼儿，及时转介至县级妇幼保健机构或相应专业医疗机构进行专项检查。
          - paragraph [ref=e229]:
            - strong [ref=e230]: （三）村卫生室。
          - paragraph [ref=e231]: 配合乡镇卫生院、社区卫生服务中心及县级妇幼保健机构开展养育风险评估及咨询指导，配合开展养育照护小组活动。
          - paragraph [ref=e232]:
            - strong [ref=e233]: 五、服务指标
          - paragraph [ref=e234]:
            - strong [ref=e235]: （一）婴幼儿养育风险评估率：
            - text: 统计期限内辖区3岁以下儿童系统接受养育风险评估人数/统计期限内辖区3岁以下儿童数×100％。
          - paragraph [ref=e236]: 其中，3岁以下儿童系统接受养育风险评估人数：指3岁以下儿童按年龄要求0～1岁接受5次、1～2岁接受2次、2～3岁接受2次养育风险评估的人数之和。
          - paragraph [ref=e237]:
            - strong [ref=e238]: （二）婴幼儿养育风险咨询指导率：
            - text: 统计期限内辖区3岁以下儿童系统接受养育风险咨询指导人数/统计期限内辖区3岁以下儿童数×100％。
          - paragraph [ref=e239]: 其中，3岁以下儿童系统接受养育风险咨询指导人数：指3岁以下儿童按年龄要求0～1岁接受5次、1～2岁接受2次、2～3岁接受2次养育风险咨询指导的人数之和。
          - paragraph [ref=e240]:
            - strong [ref=e241]: （三）婴幼儿养育照护小组活动参与率：
            - text: 统计期限内辖区3岁以下儿童参加1次及以上养育照护小组活动人数/统计期限内辖区3岁以下儿童数×100％。
          - paragraph [ref=e242]:
            - strong [ref=e243]: 六、名词解释
          - paragraph [ref=e244]:
            - strong [ref=e245]: （一）大运动：
            - text: 是身体对大动作的控制，使儿童能够在周围环境中进行日常活动和游戏，如抬头、坐、爬、站、走、跑、跳等。
          - paragraph [ref=e246]:
            - strong [ref=e247]: （二）精细动作：
            - text: 是指涉及手臂前部较小肌肉的运动，主要包括手和手指的动作，通过手眼协调实现对物体的操控，如抓取、捡拾、握、捏等动作。
          - paragraph [ref=e248]:
            - strong [ref=e249]: （三）语言：
            - text: 是人类特有的高级神经活动，通过包含特定意思的有声符号用以传递思想和观念，包括文字、声音、视觉信号、手势等。语言发展是指儿童逐步理解和使用语言进行交流的动态发育过程，包括发出语音（声音）、理解语义（词义）、使用语法（句子结构）和应用语言社交等方面技能的发展。
          - paragraph [ref=e250]:
            - strong [ref=e251]: （四）认知：
            - text: 是个体对客观世界的认识。大脑对来自客观世界的信息进行加工处理，分析总结，把握规律，并作出判断和决策的系列过程。涉及感知觉、记忆、思维、想象等方面。
          - paragraph [ref=e252]:
            - strong [ref=e253]: （五）社会交往：
            - text: 是个体对他人的认识。个体在与他人接触中相互影响、相互作用，是个体适应和融入社会环境的重要过程，也是儿童早期发展的重要方面。
          - paragraph [ref=e254]:
            - strong [ref=e255]: （六）感知觉：
            - text: 是指人体通过眼、耳、鼻、舌、肢体等感觉器官从外部世界获取信息并分析研判指导行动的过程，包括视、听、触、嗅、味，以及个体对空间、大小、形状、时间的感知等。感觉是人体对物体个别属性的反映，知觉是在感觉的基础上，对物体整体属性的综合反映。
          - paragraph [ref=e256]: 附件：
